<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invite — TripNest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../shared/common.css" />
    <link rel="stylesheet" href="invite.css" />
</head>

<body>

    <div id="app">

        <div class="main">

            <header class="topbar">
                <div style="display:flex;align-items:center;gap:12px">
                    <a class="btn btn-ghost" style="padding:8px 12px" href="../active-trip/active-trip.html">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2">
                            <polyline points="15 18 9 12 15 6" />
                        </svg>
                    </a>
                    <span class="topbar-title">Invite Collaborators</span>
                </div>
            </header>

            <div class="invite-page">
                <div class="invite-card">

                    <div class="invite-card-header">
                        <div class="invite-icon">
                            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#006c75"
                                stroke-width="2">
                                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                                <circle cx="9" cy="7" r="4" />
                                <line x1="19" y1="8" x2="19" y2="14" />
                                <line x1="22" y1="11" x2="16" y2="11" />
                            </svg>
                        </div>
                        <div>
                            <h1 class="invite-title">Invite to Your Trip</h1>
                            <p class="invite-sub">Share this trip with friends and family as a Viewer or Editor</p>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Generate Invite Link</label>
                        <button class="gen-link-btn" id="gen-btn" onclick="generateLink()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
                            </svg>
                            Generate Random Link
                        </button>
                        <div class="url-row">
                            <input class="form-input" id="invite-url" type="text" value="https://tripnest.app/join/–––"
                                readonly />
                            <button class="copy-btn" id="copy-btn" onclick="copyLink()">Copy</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Permission Level</label>
                        <select class="form-input" id="permission">
                            <option value="viewer">Viewer — Can view logs only</option>
                            <option value="editor">Editor — Can add &amp; edit logs</option>
                        </select>
                        <p class="permission-hint" id="permission-hint">Viewers can browse the full trip but cannot make
                            changes.</p>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Invite by Email</label>
                        <div class="url-row">
                            <input class="form-input" id="email-input" type="email" placeholder="friend@email.com"
                                style="background:#fff" />
                            <button class="copy-btn send-btn" onclick="sendInvite()">Send</button>
                        </div>
                    </div>

                    <div class="members-row">
                        <span class="form-label" style="margin:0">Current Members</span>
                        <div class="member-list" id="member-list">
                            <div class="member-chip">
                                <div class="avatar sm" style="background:#006c75">SA</div>
                                <span>Sammi A. <em>(Owner)</em></span>
                            </div>
                            <div class="member-chip">
                                <div class="avatar sm" style="background:#e07b39">RK</div>
                                <span>Ravi K. <em>(Editor)</em></span>
                            </div>
                            <div class="member-chip">
                                <div class="avatar sm" style="background:#4a90a4">PL</div>
                                <span>Priya L. <em>(Viewer)</em></span>
                            </div>
                        </div>
                    </div>

                    <a class="btn btn-outline" href="../active-trip/active-trip.html"
                        style="margin-top:8px;justify-content:center">
                        ← Back to Trip
                    </a>

                </div>
            </div>
        </div>
    </div>

    <script>window.ACTIVE_PAGE = 'invite';</script>
    <script src="../shared/sidebar.js"></script>
    <script src="invite.js"></script>
</body>

</html>
